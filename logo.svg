<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Decorative mandala element -->
  <g transform="translate(25, 40)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#D97706" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <!-- Petals -->
    <path d="M 0,-10 Q 3,-15 0,-20 Q -3,-15 0,-10" fill="#F59E0B" opacity="0.6"/>
    <path d="M 0,10 Q 3,15 0,20 Q -3,15 0,10" fill="#F59E0B" opacity="0.6"/>
    <path d="M -10,0 Q -15,-3 -20,0 Q -15,3 -10,0" fill="#F59E0B" opacity="0.6"/>
    <path d="M 10,0 Q 15,-3 20,0 Q 15,3 10,0" fill="#F59E0B" opacity="0.6"/>
  </g>
  
  <!-- SIG Text -->
  <text x="70" y="55" font-family="'Iowan Old Style', 'Palatino Linotype', serif" font-size="42" font-weight="400" fill="#F59E0B" letter-spacing="2">SIG</text>
  
  <!-- Subtitle -->
  <text x="70" y="68" font-family="'Iowan Old Style', 'Palatino Linotype', serif" font-size="10" fill="#9CA3AF" letter-spacing="3">SOCIETY OF INDIAN GRANDPARENTS</text>
</svg>